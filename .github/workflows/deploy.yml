name: Deploy to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '.env.example'
      - '.github/**'
      - '!.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy to gunerdev.com
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Assemble standalone artifact
        run: |
          # Standalone server'ın ihtiyaç duyduğu statik dosyaları yanına kopyala
          cp -r public .next/standalone/public
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static
          cp ecosystem.config.js .next/standalone/ecosystem.config.js
          tar czf release.tar.gz -C .next/standalone .
          ls -lh release.tar.gz

      - name: Verify required secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          fail=0
          if [ -z "$SSH_HOST" ];        then echo "::error::SSH_HOST secret is empty or missing";        fail=1; fi
          if [ -z "$SSH_USER" ];        then echo "::error::SSH_USER secret is empty or missing";        fail=1; fi
          if [ -z "$SSH_KNOWN_HOSTS" ]; then echo "::error::SSH_KNOWN_HOSTS secret is empty or missing"; fail=1; fi
          if [ -z "$SSH_PRIVATE_KEY" ]; then echo "::error::SSH_PRIVATE_KEY secret is empty or missing"; fail=1; fi
          if [ "$fail" = "1" ]; then
            echo "Add missing secrets at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload artifact and deploy script to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          scp -i ~/.ssh/id_ed25519 \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o ConnectTimeout=15 \
              release.tar.gz \
              "$SSH_USER@$SSH_HOST:/tmp/gunerdev-release.tar.gz"
          scp -i ~/.ssh/id_ed25519 \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o ConnectTimeout=15 \
              deploy/deploy.sh \
              "$SSH_USER@$SSH_HOST:/tmp/gunerdev-deploy.sh"

      - name: Run deploy on VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o ConnectTimeout=15 \
              "$SSH_USER@$SSH_HOST" \
              'bash /tmp/gunerdev-deploy.sh'
